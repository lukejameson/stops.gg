version: '3.8'

services:
  placeholder:
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.placeholder.rule=Host(`routes.gg`)"
      - "traefik.http.routers.placeholder.entrypoints=websecure"
      - "traefik.http.routers.placeholder.tls.certresolver=letsencrypt"
      - "traefik.http.services.placeholder.loadbalancer.server.port=80"
    networks:
      - web
    restart: unless-stopped

networks:
  web:
    external: true
